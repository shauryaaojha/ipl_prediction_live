# IPL 2026 Data Scraper — Source Configuration
# ==============================================
# URL templates and selectors for each data source.

espncricinfo:
  base_url: "https://www.espncricinfo.com"
  api_base: "https://hs-consumer-api.espncricinfo.com"

  endpoints:
    series_schedule: "/v1/pages/series/schedule?seriesId={series_id}"
    match_details: "/v1/pages/match/details?seriesId={series_id}&matchId={match_id}"
    match_scorecard: "/v1/pages/match/scorecard?seriesId={series_id}&matchId={match_id}"
    match_commentary: "/v1/pages/match/comments?seriesId={series_id}&matchId={match_id}&inningNumber={innings}&page={page}"
    player_stats: "/v1/pages/player/stats?playerId={player_id}"
    player_profile: "/v1/pages/player/summary?playerId={player_id}"
    venue_details: "/v1/pages/ground/details?groundId={ground_id}"
    series_squads: "/v1/pages/series/squads?seriesId={series_id}"
    team_squad: "/v1/pages/series/squads?seriesId={series_id}&teamId={team_id}"

  # HTML page patterns (fallback if API unavailable)
  pages:
    match_page: "/series/{series_slug}/{series_id}/{match_slug}/{match_id}/full-scorecard"
    player_page: "/cricketers/{player_slug}-{player_id}"
    venue_page: "/ground/{venue_slug}/{venue_id}"
    series_page: "/series/{series_slug}-{series_id}/match-schedule-fixtures-and-results"

  # IPL Series IDs (known)
  ipl_series_ids:
    2008: 313494
    2009: 374163
    2010: 418064
    2011: 466304
    2012: 520932
    2013: 586733
    2014: 695871
    2015: 791129
    2016: 968923
    2017: 1078425
    2018: 1131611
    2019: 1165643
    2020: 1210595
    2021: 1249214
    2022: 1298423
    2023: 1345038
    2024: 1410320
    2025: 1449924
    # 2026: TBD — Update when announced

cricbuzz:
  base_url: "https://www.cricbuzz.com"
  api_base: "https://www.cricbuzz.com/api"

  endpoints:
    match_list: "/cricket-scores/{series_id}"
    match_scorecard: "/api/html/cricket-scorecard/{match_id}"
    match_commentary: "/api/html/cricket-commentary/{match_id}"
    player_profile: "/profiles/{player_id}"
    player_stats: "/profiles/{player_id}/career"
    series_squads: "/cricket-series/{series_id}/squads"
    series_schedule: "/cricket-series/{series_id}/matches"

  # HTML selectors
  selectors:
    match_card: "div.cb-col-100.cb-col.cb-schdl"
    score_card: "div.cb-col.cb-col-100.cb-ltst-wgt"
    player_row: "div.cb-col.cb-col-100.cb-plyr-tbody"
    team_name: "div.cb-team-info"

  # Known IPL series slugs on Cricbuzz
  ipl_series_slugs:
    2023: "indian-premier-league-2023-6732"
    2024: "indian-premier-league-2024-7607"
    2025: "indian-premier-league-2025-9237"

iplt20:
  base_url: "https://www.iplt20.com"

  endpoints:
    match_list: "/matches/results"
    match_schedule: "/matches/schedule"
    match_scorecard: "/match/{season}/{match_id}"
    team_squad: "/teams/{team_slug}/squad"
    player_profile: "/teams/{team_slug}/squad/{player_slug}"
    points_table: "/points-table/{season}"
    stats_batting: "/stats/{season}/most-runs"
    stats_bowling: "/stats/{season}/most-wickets"
    venues: "/venues"
    venue_detail: "/venues/{venue_slug}"
    auction: "/auction/{season}"
    news: "/news"

  # HTML selectors
  selectors:
    match_card: "li.result"
    scorecard_table: "table.table"
    squad_player: "div.player-card"
    stats_row: "table.stats-table tbody tr"
    venue_card: "div.venue-card"

  # Team slugs
  teams:
    CSK: "chennai-super-kings"
    MI: "mumbai-indians"
    RCB: "royal-challengers-bengaluru"
    KKR: "kolkata-knight-riders"
    SRH: "sunrisers-hyderabad"
    DC: "delhi-capitals"
    RR: "rajasthan-royals"
    PBKS: "punjab-kings"
    GT: "gujarat-titans"
    LSG: "lucknow-super-giants"

weather:
  openweathermap:
    base_url: "https://api.openweathermap.org/data/2.5"
    endpoints:
      current: "/weather?q={city}&appid={api_key}&units=metric"
      forecast: "/forecast?q={city}&appid={api_key}&units=metric"
      historical: "/onecall/timemachine?lat={lat}&lon={lon}&dt={timestamp}&appid={api_key}&units=metric"

  visualcrossing:
    base_url: "https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services"
    endpoints:
      timeline: "/timeline/{city}/{date}?unitGroup=metric&key={api_key}&include=hours"

  # IPL venue city coordinates (for weather lookups)
  venue_coordinates:
    "Chennai": { lat: 13.0827, lon: 80.2707 }
    "Mumbai": { lat: 19.0760, lon: 72.8777 }
