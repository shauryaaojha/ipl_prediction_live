# IPL 2026 Data Scraper — Logging Configuration
# ================================================

logging:
  level: "INFO"                     # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level:<8} | {name}:{function}:{line} | {message}"
  colorize: true                    # Colorized console output

  # File handlers
  handlers:
    - sink: "${DATA_PATH:./data}/logs/scraper.log"
      level: "INFO"
      rotation: "50 MB"
      retention: "30 days"
      compression: "gz"
      format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level:<8} | {name}:{function}:{line} | {message}"

    - sink: "${DATA_PATH:./data}/logs/error.log"
      level: "ERROR"
      rotation: "20 MB"
      retention: "60 days"
      compression: "gz"
      format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level:<8} | {name}:{function}:{line} | {message}\n{exception}"

    - sink: "${DATA_PATH:./data}/logs/scrape_debug.log"
      level: "DEBUG"
      rotation: "100 MB"
      retention: "7 days"
      compression: "gz"
      filter: "src.scrapers"
      format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level:<8} | {name}:{function}:{line} | {message}"

  # Module-specific overrides
  modules:
    "src.scrapers": "DEBUG"
    "src.storage": "INFO"
    "src.core.orchestrator": "INFO"
    "httpx": "WARNING"
    "sqlalchemy.engine": "WARNING"
